name: Compilation for Griotte

# Prevent parallel CI: Stop every workflow of a branch
concurrency:
  cancel-in-progress: true
  group: ${{ github.ref }}

on:
  push:
    branches:
      - main

jobs:
  build:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    env:
      OPAM_LOCAL: "_opam"
      OCAML_VERSION: "4.14.0"
      JOBS_LIMIT: "2"

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Install OCaml
        uses: avsm/setup-ocaml@v3
        with:
          ocaml-compiler: ${{ env.OCAML_VERSION }}
          opam-repositories: |
            rocq-released: https://rocq-prover.org/opam/released
            default: https://github.com/ocaml/opam-repository.git

      - name: Cache opam
        id: cache-opam
        uses: actions/cache@v5
        env:
          cache-name: cache-opam
        with:
          path: ${{ env.OPAM_LOCAL }}
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('opam') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-

      # We force saving the cache of dune at every build because increment compilation will take care of the rest
      # If we don't, it's
      - name: Restore Cache Dune _build directory
        id: cache-dune-build-restore
        uses: actions/cache/restore@v5
        with:
          path: _build
          key: |
            dune-build-${{ runner.os }}-ocaml${{ env.OCAML_VERSION }}

      - name: Install Rocq and Iris (deps only)
        if: steps.cache-opam.outputs.cache-hit != 'true'
        run: |
          eval "$(opam env)"
          opam install . --deps-only -y

      - name: Build
        if: steps.cache-dune-build-restore.outputs.cache-hit != 'true'
        run: |
          eval "$(opam env)"
          opam exec -- dune build --display short -j ${{ env.JOBS_LIMIT }} --trace-file griotte.trc
          ./pretty-print-trace.sh griotte.trc

      - name: Build docs
        run: opam exec -- make html

      - name: Save Cache Dune _build
        id: cache-dune-build-save
        uses: actions/cache/save@v5
        with:
          path: _build
          key: |
            ${{ steps.cache-dune-build-restore.outputs.cache-primary-key }}

      - name: Deploy docs (if main branch)
        if: ${{ github.ref_name == 'main' }}
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./html
          destination_dir: dev
